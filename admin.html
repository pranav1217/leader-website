<!DOCTYPE html>
<html>

<head>
<title>तक्रार यादी</title>

<script>
// Admin protection
if(localStorage.getItem("admin") !== "true"){
    window.location.href = "login.html";
}
</script>

<style>

body{
font-family: Arial;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid black;
padding:10px;
text-align:center;
}

th{
background:#ff6a00;
color:white;
}

button{
padding:6px 10px;
margin:2px;
cursor:pointer;
}

.solve{
background:green;
color:white;
}

.delete{
background:red;
color:white;
}

.logout{
background:black;
color:white;
margin-top:20px;
}
.stats{
display:flex;
gap:20px;
margin-bottom:20px;
}

.stat-box{
flex:1;
background:#f2f2f2;
padding:20px;
text-align:center;
border-radius:8px;
}
.delete-btn{
background:red;
color:white;
border:none;
padding:5px 10px;
margin-top:5px;
cursor:pointer;
border-radius:5px;
}

.delete-btn:hover{
background:darkred;
}

</style>

</head>

<body>

<h2>नागरिक तक्रार यादी</h2>
<div class="stats">

<div class="stat-box">
<h3 id="total">0</h3>
<p>Total Complaints</p>
</div>

<div class="stat-box">
<h3 id="pending">0</h3>
<p>Pending</p>
</div>

<div class="stat-box">
<h3 id="solved">0</h3>
<p>Solved</p>
</div>

</div>
<table>

<thead>
<tr>
<th>ID</th>
<th>नाव</th>
<th>मोबाईल</th>
<th>एरिया</th>
<th>समस्या</th>
<th>Status</th>
<th>Action</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="complaintTable"></tbody>

</table>

<button class="logout" onclick="logout()">Logout</button>
<h2>Banner Upload</h2>

<input type="file" id="bannerFile">
<button onclick="uploadBanner()">Upload Banner</button>

<div id="bannerList"></div>
<div class="banner-card">
    <img src="http://127.0.0.1:3000/static/${b.image}" width="200">

    <button type="button" onclick="deleteBanner(1)">
Delete
</button>   
</div>
<script>

// ============================
// LOAD ADMIN BANNERS
// ============================

function loadAdminBanners(){

fetch("http://127.0.0.1:3000/banners")
.then(res => res.json())
.then(data => {

let box = document.getElementById("bannerList");
box.innerHTML = "";

data.forEach(b => {

box.innerHTML += `
<div class="banner-card">
    <img src="http://127.0.0.1:3000/static/${b.image}" width="200">
    
    <button onclick="deleteBanner(${b.id})">
        Delete
    </button>
</div>
`;

});

});

}


// ============================
// UPLOAD BANNER
// ============================

function uploadBanner(){

let fileInput = document.getElementById("bannerFile");

if(fileInput.files.length === 0){
alert("Please select file");
return;
}

let formData = new FormData();
formData.append("file", fileInput.files[0]);

fetch("http://127.0.0.1:3000/upload-banner",{
method:"POST",
body: formData
})
.then(res => res.json())
.then(data => {

alert("Upload झाले 👍");

// reload banners
loadAdminBanners();

});

}


// ============================
// DELETE BANNER (FINAL FIX)
// ============================

function deleteBanner(id){

console.log("Deleting ID:", id);

if(!confirm("Delete this banner?")) return;

fetch("http://127.0.0.1:3000/delete-banner",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({id:id})
})
.then(res => res.json())
.then(data => {

alert("Deleted successfully");

// reload banners
loadAdminBanners();

})
.catch(err=>{
console.error(err);
alert("Delete failed ❌");
});

}


// ============================
// AUTO LOAD
// ============================

window.onload = ()=>{
loadAdminBanners();
};
</script>

</body>
</html>
